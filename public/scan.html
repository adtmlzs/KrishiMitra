<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiMitra Pro | AI Smart Scan</title>
    <style>
        /* --- PREMIUM STYLES FROM PLANT.HTML --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            color: #2c5364;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(120, 255, 180, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%);
            pointer-events: none;
            animation: bgShift 20s ease-in-out infinite;
        }

        @keyframes bgShift {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 35, 39, 0.97);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 340px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.6s ease;
        }

        .login-box h2 {
            margin: 0 0 10px 0;
            color: #0f2027;
            font-weight: 800;
            font-size: 1.8em;
        }

        .login-box p {
            color: #64748b;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .login-box input:focus {
            border-color: #78ffb4;
        }

        .login-box button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #78ffb4 0%, #66d9ff 100%);
            color: #0f2027;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(120, 255, 180, 0.3);
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(120, 255, 180, 0.4);
        }

        .login-box button:active {
            transform: translateY(0);
        }

        #conn-status {
            margin-top: 10px;
            font-size: 12px;
            color: #ef4444;
            min-height: 18px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            display: none;
        }

        .container.active {
            display: block;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 35px;
            animation: fadeInDown 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            font-size: 3.2em;
            font-weight: 900;
            background: linear-gradient(135deg, #78ffb4 0%, #a8e6cf 50%, #66d9ff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 35px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        /* --- LIVE FEED COMPONENT --- */
        .live-feed-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 25px;
            overflow: hidden;
            position: relative;
            margin-bottom: 25px;
            border: 4px solid #78ffb4;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.3);
        }

        #liveStream {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .live-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 6px 15px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.75em;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: flash 2s infinite;
        }

        @keyframes flash {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .controls {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #78ffb4 0%, #66d9ff 100%);
            color: #0f2027;
            border: none;
            padding: 20px;
            font-size: 1.1em;
            font-weight: 800;
            border-radius: 22px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(120, 255, 180, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(120, 255, 180, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            box-shadow: none;
        }

        /* --- RESULTS (SPACIOUS & INFORMATIVE) --- */
        .results {
            display: none;
            margin-top: 40px;
            border-top: 2px solid #f1f5f9;
            padding-top: 40px;
        }

        .results.active {
            display: block;
            animation: fadeInUp 0.8s ease;
        }

        .health-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 30px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            margin-bottom: 30px;
        }

        .health-badge {
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .healthy {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .unhealthy {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .plant-name {
            font-size: 2.5em;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }

        .info-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            border-left: 4px solid #78ffb4;
        }

        .info-label {
            font-size: 0.75em;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .info-value {
            font-weight: 700;
            color: #1e293b;
            font-size: 1.1em;
        }

        .diagnosis-box {
            background: #fff;
            border-radius: 25px;
            padding: 30px;
            margin-top: 25px;
            border: 1px solid #fee2e2;
            border-left: 8px solid #ef4444;
            box-shadow: 0 15px 35px rgba(239, 68, 68, 0.05);
        }

        .treatment-list {
            list-style: none;
            margin-top: 15px;
        }

        .treatment-list li {
            padding: 10px 0 10px 35px;
            position: relative;
            color: #475569;
            line-height: 1.6;
        }

        .treatment-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #10b981;
            font-weight: 900;
            font-size: 1.3em;
        }

        /* --- LOADER --- */
        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f1f5f9;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- BACK BUTTON --- */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-decoration: none;
            color: #0f2027;
            font-weight: 700;
            font-size: 0.9em;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 1);
        }

        .back-button:active {
            transform: translateY(0);
        }

        .back-arrow {
            font-size: 1.2em;
            transition: transform 0.3s ease;
        }

        .back-button:hover .back-arrow {
            transform: translateX(-3px);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2em;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .health-card {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }

            .back-button {
                padding: 10px 18px;
                font-size: 0.85em;
            }
        }
    </style>
</head>

<body>

    <a href="/" class="back-button">
        <span class="back-arrow">←</span>
        <span>Back to Home</span>
    </a>

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>🌿 KrishiMitra Scan</h2>
            <p>Enter Camera IP Address</p>
            <input type="text" id="camera-ip" placeholder="e.g. 192.168.137.162:8080" value="192.168.137.162:8080">
            <button onclick="connectCamera()">Connect Camera</button>
            <div id="conn-status"></div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>KrishiMitra Scan</h1>
            <p style="color: #a8e6cf; font-weight: 500;">Pro AI Plant Diagnostics</p>
        </header>

        <div class="main-card">
            <div class="live-feed-wrapper">
                <div class="live-badge">● LIVE MONITORING</div>
                <img id="liveStream" src="https://placehold.co/800x450/000?text=Enter+Camera+IP+to+Connect"
                    crossorigin="anonymous"
                    onerror="this.src='https://placehold.co/800x450/000?text=Connecting+to+Camera...'">
            </div>

            <div class="controls">
                <button class="btn" id="scanBtn">📸 START AI DIAGNOSIS</button>
                <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">📁
                    UPLOAD</button>
            </div>
            <input type="file" id="fileInput" hidden accept="image/*">

            <div id="loader" class="loading">
                <div class="spinner"></div>
                <h3 style="color: #1e293b;">Analyzing Plant Health...</h3>
                <p style="color: #64748b; margin-top: 10px;">Cross-referencing symptoms with AI database</p>
            </div>

            <div id="results" class="results">
                <div id="report-content"></div>
            </div>
        </div>
    </div>

    <canvas id="helperCanvas" style="display:none;"></canvas>

    <script src="/env-config.js"></script>
    <script>
        // --- CAMERA IP STORAGE ---
        let CAMERA_IP = "";

        // --- CONNECT CAMERA FUNCTION ---
        function connectCamera() {
            const ipInput = document.getElementById('camera-ip').value;
            if (!ipInput) {
                document.getElementById('conn-status').innerText = "Please enter an IP address";
                return;
            }

            CAMERA_IP = ipInput;

            // UI Transition
            const loginOverlay = document.getElementById('login-overlay');
            const container = document.querySelector('.container');

            loginOverlay.style.opacity = 0;
            setTimeout(() => {
                loginOverlay.style.display = 'none';
                container.classList.add('active');

                // Update livestream URL with the entered IP
                const liveStream = document.getElementById('liveStream');
                liveStream.src = `http://${CAMERA_IP}/?action=stream`;
            }, 500);
        }

        // --- API CONFIG (Using injected config) ---
        const CONFIG = {
            API_KEY: window.ENV_CONFIG?.VITE_PLANTID_API_KEY || "",
            HEALTH_URL: "https://api.plant.id/v2/health_assessment",
            ID_URL: "https://api.plant.id/v2/identify"
        };

        const liveStream = document.getElementById('liveStream');
        const scanBtn = document.getElementById('scanBtn');
        const loader = document.getElementById('loader');
        const resultsDiv = document.getElementById('results');
        const reportContent = document.getElementById('report-content');
        const canvas = document.getElementById('helperCanvas');

        // Capture Logic
        scanBtn.addEventListener('click', async () => {
            canvas.width = liveStream.naturalWidth || 640;
            canvas.height = liveStream.naturalHeight || 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(liveStream, 0, 0);

            const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            await performDiagnostics(base64);
        });

        // File Upload Logic
        document.getElementById('fileInput').addEventListener('change', function (e) {
            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result.split(',')[1];
                await performDiagnostics(base64);
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        async function performDiagnostics(base64) {
            loader.classList.add('active');
            resultsDiv.classList.remove('active');

            try {
                const [hReq, iReq] = await Promise.all([
                    fetch(CONFIG.HEALTH_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Api-Key': CONFIG.API_KEY },
                        body: JSON.stringify({
                            images: [base64],
                            disease_details: ['description', 'treatment', 'cause', 'common_names']
                        })
                    }),
                    fetch(CONFIG.ID_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Api-Key': CONFIG.API_KEY },
                        body: JSON.stringify({
                            images: [base64],
                            plant_details: ['taxonomy', 'wiki_description', 'common_names', 'watering']
                        })
                    })
                ]);

                const health = await hReq.json();
                const identity = await iReq.json();
                renderReport(health.health_assessment, identity.suggestions[0]);
            } catch (err) {
                alert("Diagnostic Error: Please check connection.");
            } finally {
                loader.classList.remove('active');
            }
        }

        function renderReport(health, plant) {
            const isHealthy = health.is_healthy;
            const details = plant.plant_details || {};

            let html = `
                <div class="health-card">
                    <div>
                        <p class="info-label">Overall Health</p>
                        <div class="health-badge ${isHealthy ? 'healthy' : 'unhealthy'}">
                            ${isHealthy ? '● Healthy Plant' : '⚠ Attention Required'}
                        </div>
                    </div>
                    <div style="text-align: right">
                        <p class="info-label">AI Confidence</p>
                        <p style="font-size: 1.5em; font-weight: 900; color: #10b981;">${(plant.probability * 100).toFixed(1)}%</p>
                    </div>
                </div>

                <h2 class="plant-name">🌿 ${plant.plant_name}</h2>
                <p style="color: #64748b; line-height: 1.6; margin-bottom: 25px;">${details.wiki_description?.value || 'Detailed description not available.'}</p>

                <div class="info-grid">
                    <div class="info-card">
                        <p class="info-label">Common Names</p>
                        <p class="info-value">${details.common_names?.slice(0, 2).join(', ') || 'N/A'}</p>
                    </div>
                    <div class="info-card">
                        <p class="info-label">Scientific Family</p>
                        <p class="info-value">${details.taxonomy?.family || 'N/A'}</p>
                    </div>
                    <div class="info-card">
                        <p class="info-label">Watering Needs</p>
                        <p class="info-value">Moderate</p>
                    </div>
                </div>
            `;

            if (!isHealthy && health.diseases.length > 0) {
                html += `<h2 style="margin-top: 40px; font-weight: 900; color: #ef4444;">Detected Pathogens</h2>`;
                health.diseases.forEach(d => {
                    const det = d.disease_details;
                    html += `
                        <div class="diagnosis-box">
                            <h3 style="color: #ef4444; font-weight: 800;">🦠 ${d.name}</h3>
                            <p style="font-size: 0.9em; margin: 10px 0; color: #7f1d1d; opacity: 0.8;"><strong>Cause:</strong> ${det.cause || 'Unknown'}</p>
                            <p style="font-size: 0.95em; line-height: 1.6;">${det.description}</p>
                            
                            <div style="margin-top: 20px; border-top: 1px solid #fee2e2; padding-top: 15px;">
                                <p class="info-label" style="color: #b91c1c;">Farmer Action Plan:</p>
                                <ul class="treatment-list">
                                    ${(det.treatment?.biological || det.treatment?.chemical || ['Consult local agricultural office.']).map(t => `<li>${t}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `
                    <div class="diagnosis-box" style="border-left-color: #10b981; border-color: #d1fae5; background: #f0fdf4;">
                        <h3 style="color: #065f46;">✅ Healthy Condition</h3>
                        <p style="color: #065f46; margin-top: 5px;">No significant pests or diseases found. Maintain standard care routines.</p>
                    </div>
                `;
            }

            reportContent.innerHTML = html;
            resultsDiv.classList.add('active');
            window.scrollTo({ top: resultsDiv.offsetTop - 50, behavior: 'smooth' });
        }
    </script>
</body>

</html>
