<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro 4WD | Unified FPV & Telemetry</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* --- CORE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            color: white;
            overflow: hidden; 
            touch-action: none; 
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(120, 255, 180, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(102, 126, 234, 0.15) 0%, transparent 50%);
            pointer-events: none; animation: bgShift 20s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* --- IP CONNECTION OVERLAY --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 35, 39, 0.97); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; transition: opacity 0.5s;
        }

        .login-box {
            background: white; padding: 40px; border-radius: 24px; width: 340px;
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .login-box h2 { color: #0f2027; font-weight: 800; font-size: 1.8em; margin-bottom: 10px; }
        .login-box p { color: #64748b; margin-bottom: 25px; font-size: 0.95rem; }
        
        .login-box input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 16px; text-align: center; outline: none;
            transition: border-color 0.2s;
        }
        .login-box input:focus { border-color: #78ffb4; }

        .login-box button {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #78ffb4 0%, #66d9ff 100%);
            color: #0f2027; border: none; border-radius: 12px;
            font-weight: 800; font-size: 16px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(120, 255, 180, 0.3);
        }
        .login-box button:active { transform: translateY(2px); box-shadow: none; }
        #conn-status { margin-top: 10px; font-size: 12px; color: #ef4444; min-height: 18px; }

        /* --- MAIN DASHBOARD --- */
        .container {
            max-width: 800px; margin: 0 auto; padding: 20px;
            display: none; flex-direction: column; align-items: center;
            height: 100vh; position: relative; z-index: 1;
        }
        .container.active { display: flex; }

        /* --- FPV & PiP WIDGET WRAPPER --- */
        .live-feed-wrapper {
            width: 100%; max-width: 600px; aspect-ratio: 16/9;
            background: #000; border-radius: 20px; overflow: hidden;
            position: relative; margin-bottom: 20px;
            border: 3px solid rgba(120, 255, 180, 0.5);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
        }
        #liveStream { width: 100%; height: 100%; object-fit: cover; }
        
        .live-badge {
            position: absolute; top: 15px; left: 15px;
            background: rgba(239, 68, 68, 0.9); color: white;
            padding: 5px 12px; border-radius: 8px;
            font-weight: 800; font-size: 0.7em; letter-spacing: 1px;
            animation: flash 2s infinite; z-index: 5;
        }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- 3D PiP WIDGET --- */
        #widget-3d {
            position: absolute;
            bottom: 15px; right: 15px;
            width: 110px; height: 80px;
            background-color: #0f172a;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(120, 255, 180, 0.6);
            cursor: pointer; z-index: 10;
        }

        /* Expanded mode fills the FPV screen completely */
        #widget-3d.expanded {
            width: 100%; height: 100%;
            bottom: 0; right: 0;
            border-radius: 0; border: none;
        }

        #canvas-container { width: 100%; height: 100%; }

        .hud-overlay {
            position: absolute; top: 8px; left: 8px; right: 8px;
            pointer-events: none; opacity: 0.9;
        }
        
        /* Hide text in small mode to prevent clutter */
        #widget-3d:not(.expanded) .hud-overlay span { display: none; }
        #widget-3d:not(.expanded) .hud-overlay { top: 4px; left: 4px; right: 4px; }

        .hud-header {
            display: flex; justify-content: space-between;
            font-size: 10px; color: #94a3b8; font-weight: 700;
            letter-spacing: 1px; margin-bottom: 8px;
        }

        .telemetry-row { margin-bottom: 6px; }
        .t-label {
            display: flex; justify-content: space-between;
            font-size: 9px; color: #cbd5e1; margin-bottom: 2px;
        }
        .t-bar-bg {
            width: 100%; height: 3px; background: rgba(255, 255, 255, 0.1);
            border-radius: 2px; overflow: hidden;
        }
        .t-bar-fill {
            height: 100%; background: #78ffb4; width: 0%;
            transition: width 0.1s; position: relative; left: 50%;
        }

        /* --- TELEMETRY & SPEED --- */
        .dashboard-controls {
            width: 100%; max-width: 600px;
            background: rgba(255,255,255,0.05); padding: 15px 25px;
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px; text-align: center; backdrop-filter: blur(10px);
        }
        
        #status { font-size: 18px; font-weight: bold; color: #a8e6cf; text-transform: uppercase; margin-bottom: 10px; }
        
        .slider-container { display: flex; align-items: center; gap: 15px; }
        .slider-container label { font-weight: bold; font-size: 14px; width: 100px; text-align: left; }
        input[type=range] { flex-grow: 1; height: 6px; border-radius: 5px; outline: none; }

        /* --- D-PAD CONTROLLER --- */
        .d-pad {
            display: grid; grid-template-columns: 80px 80px 80px; grid-template-rows: 80px 80px 80px;
            gap: 12px; margin-top: auto; margin-bottom: 30px;
        }

        .btn {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 18px; color: white; font-size: 28px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 6px 0 rgba(0,0,0,0.3); backdrop-filter: blur(5px);
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
        }
        .btn.active {
            background: #78ffb4; color: #0f2027; border-color: #78ffb4;
            transform: translateY(6px); box-shadow: 0 0px 0 rgba(0,0,0,0.8);
        }

        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .down { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>🏎️ 4WD Link</h2>
            <p>Enter Raspberry Pi IP Address</p>
            <input type="text" id="robot-ip" placeholder="e.g. 192.168.1.50">
            <button onclick="connectRobot()">Connect</button>
            <div id="conn-status"></div>
        </div>
    </div>

    <div class="container">
        
        <div class="live-feed-wrapper">
            <div class="live-badge">● FPV LIVE</div>
            <img id="liveStream" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Camera Feed">
            
            <div id="widget-3d" onclick="toggleExpand(this)">
                <div class="hud-overlay">
                    <div class="hud-header">
                        <span>IMU TELEMETRY</span>
                        <span>TAP TO MINIMIZE</span>
                    </div>
                    <div class="telemetry-row">
                        <div class="t-label"><span>ROLL</span><span id="txt-r">0°</span></div>
                        <div class="t-bar-bg"><div id="bar-r" class="t-bar-fill"></div></div>
                    </div>
                    <div class="telemetry-row">
                        <div class="t-label"><span>PITCH</span><span id="txt-p">0°</span></div>
                        <div class="t-bar-bg"><div id="bar-p" class="t-bar-fill"></div></div>
                    </div>
                </div>
                <div id="canvas-container"></div>
            </div>
        </div>

        <div class="dashboard-controls">
            <div id="status">SYS READY</div>
            <div class="slider-container">
                <label>PWR: <span id="speed-val">70</span>%</label>
                <input type="range" id="speed-slider" min="30" max="100" value="70">
            </div>
        </div>

        <div class="d-pad" id="controller">
            <div class="btn up" data-dir="forward">▲</div>
            <div class="btn left" data-dir="left">◀</div>
            <div class="btn right" data-dir="right">▶</div>
            <div class="btn down" data-dir="backward">▼</div>
        </div>
        
    </div>

    <script>
        let BASE_IP = "";
        let API_URL = "";
        
        function connectRobot() {
            const ipInput = document.getElementById('robot-ip').value.trim();
            if (!ipInput) {
                document.getElementById('conn-status').innerText = "IP Address is required.";
                return;
            }

            BASE_IP = ipInput;
            API_URL = `http://${BASE_IP}:5000`;

            document.getElementById('login-overlay').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
                document.querySelector('.container').classList.add('active');

                // Init Camera (Port 8080)
                const liveStream = document.getElementById('liveStream');
                liveStream.src = `http://${BASE_IP}:8080/?action=stream`;
                
                // Init 3D Engine
                init3DSystem(BASE_IP);

                // Initial speed sync
                fetchCommand(`/speed/${document.getElementById('speed-slider').value}`);
            }, 500);
        }

        // --- 1. ZERO-LATENCY HARDWARE CONTROL ---
        const buttons = document.querySelectorAll('.btn');
        const statusText = document.getElementById('status');
        const slider = document.getElementById('speed-slider');
        const speedVal = document.getElementById('speed-val');
        let currentDirection = 'stop';

        function fetchCommand(endpoint) {
            if(!API_URL) return;
            fetch(`${API_URL}${endpoint}`, { mode: 'no-cors' }).catch(() => {});
        }

        function sendDirection(cmd) {
            if (currentDirection === cmd) return; 
            currentDirection = cmd;
            statusText.innerText = cmd === 'stop' ? 'IDLE' : `MOVING ${cmd}`;
            statusText.style.color = cmd === 'stop' ? '#a8e6cf' : '#78ffb4';
            fetchCommand(`/move/${cmd}`);
        }

        slider.addEventListener('input', (e) => {
            speedVal.innerText = e.target.value;
            fetchCommand(`/speed/${e.target.value}`);
        });

        buttons.forEach(btn => {
            const dir = btn.getAttribute('data-dir');
            
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault(); 
                btn.classList.add('active');
                sendDirection(dir);
                btn.setPointerCapture(e.pointerId);
            });

            const stopAction = (e) => {
                e.preventDefault();
                if (btn.classList.contains('active')) {
                    btn.classList.remove('active');
                    sendDirection('stop');
                }
            };

            btn.addEventListener('pointerup', stopAction);
            btn.addEventListener('pointerleave', stopAction);
            btn.addEventListener('pointercancel', stopAction);
            btn.addEventListener('contextmenu', e => e.preventDefault());
        });

        // --- 2. 3D TELEMETRY ENGINE ---
        let scene, camera, renderer, carGroup;
        let targetR = 0, targetP = 0, targetY = 0;
        let currR = 0, currP = 0, currY = 0;
        let fetchInterval = null;

        function init3DSystem(ip) {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 100);
            camera.position.set(4, 3, 5);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            container.appendChild(renderer.domElement);

            const grid = new THREE.GridHelper(20, 20, 0x334155, 0x1e293b);
            scene.add(grid);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);

            // Car Model
            carGroup = new THREE.Group();
            const chassis = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 1), new THREE.MeshPhysicalMaterial({ color: 0x10b981 }));
            chassis.position.y = 0.5;
            carGroup.add(chassis);

            const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 16);
            wheelGeo.rotateX(Math.PI / 2);
            [[-0.8, 0.6], [0.8, 0.6], [-0.8, -0.6], [0.8, -0.6]].forEach(pos => {
                const w = new THREE.Mesh(wheelGeo, new THREE.MeshStandardMaterial({ color: 0x334155 }));
                w.position.set(pos[0], 0.3, pos[1]);
                carGroup.add(w);
            });
            scene.add(carGroup);

            animate();

            // Fetch IMU data (Port 2000 expected based on provided snippet)
            if (fetchInterval) clearInterval(fetchInterval);
            fetchInterval = setInterval(() => fetchTelemetry(ip), 50);

            // Handle PiP Expansion Resize
            new ResizeObserver(() => {
                const w = container.offsetWidth;
                const h = container.offsetHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            }).observe(container);
        }

        async function fetchTelemetry(ip) {
            try {
                const res = await fetch(`http://${ip}:2000/data`);
                if (res.ok) {
                    const data = await res.json();
                    targetR = THREE.MathUtils.degToRad(-data.roll);
                    targetP = THREE.MathUtils.degToRad(-data.pitch);
                    targetY = THREE.MathUtils.degToRad(-data.yaw);
                    updateHUD(data.roll, data.pitch);
                }
            } catch (e) { 
                // Silent fail if IMU server isn't running yet so it doesn't break driving
            }
        }

        function updateHUD(r, p) {
            document.getElementById('txt-r').innerText = r.toFixed(0) + "°";
            document.getElementById('txt-p').innerText = p.toFixed(0) + "°";

            const rPct = Math.max(-50, Math.min(50, (r / 45) * 50));
            const pPct = Math.max(-50, Math.min(50, (p / 45) * 50));

            const rb = document.getElementById('bar-r');
            rb.style.left = (r >= 0) ? "50%" : (50 + rPct) + "%";
            rb.style.width = Math.abs(rPct) + "%";

            const pb = document.getElementById('bar-p');
            pb.style.left = (p >= 0) ? "50%" : (50 + pPct) + "%";
            pb.style.width = Math.abs(pPct) + "%";
        }

        function animate() {
            requestAnimationFrame(animate);
            currR += (targetR - currR) * 0.1;
            currP += (targetP - currP) * 0.1;
            currY += (targetY - currY) * 0.1;
            carGroup.rotation.set(currP, currY, currR, 'YXZ');
            renderer.render(scene, camera);
        }

        function toggleExpand(el) {
            el.classList.toggle('expanded');
        }
    </script>
</body>
</html>
